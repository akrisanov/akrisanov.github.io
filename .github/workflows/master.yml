on:
  push:
    branches: [master]
  workflow_dispatch:

name: Build and deploy on Github Pages

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Install Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola@0.22.1

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick fonts-dejavu-core

      - name: Generate social preview cards
        run: bash scripts/generate-social-previews.sh

      - name: Build site
        run: zola build

      - name: build_and_deploy
        uses: shalzz/zola-deploy-action@v0.22.1
        env:
          PAGES_BRANCH: gh-pages
          TOKEN: ${{ secrets.GITHUB_TOKEN }}

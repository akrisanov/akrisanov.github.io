base_url = "https://akrisanov.com"
title = "Andrey Krisanov"

description = "Software engineer writing about production LLM inference, AI infrastructure, distributed systems, Kubernetes, vLLM, and platform reliability."

default_language = "en"
author = "Andrey Krisanov"

generate_feeds = true
feed_filenames = ["rss.xml"]

minify_html = true

# Do not add generated pagination pages to sitemap.xml.
exclude_paginated_pages_in_sitemap = "all"

taxonomies = [{ name = "tags", feed = true }]

[markdown]
render_emoji = false
external_links_target_blank = true
smart_punctuation = false

[markdown.highlighting]
highlight_code = true
light_theme = "catppuccin-latte"
dark_theme = "catppuccin-mocha"

[extra]
blog_subtitle = "Production LLM inference, AI infrastructure, and distributed systems"
home_title = "Andrey Krisanov — LLM Inference & AI Infrastructure"

[link_checker]
skip_prefixes = ["https://", "http://"]

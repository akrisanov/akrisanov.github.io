base_url = "https://akrisanov.com"
title = "Andrey Krisanov"
description = "Engineering notes on AI infrastructure, LLM systems, and software engineering."
default_language = "en"
author = "Andrey Krisanov"
generate_feeds = true
feed_filenames = ["rss.xml"]
compile_sass = false
minify_html = true

taxonomies = [
  { name = "tags", feed = true },
]

[markdown]
render_emoji = false
external_links_target_blank = true
smart_punctuation = false

[markdown.highlighting]
highlight_code = true
light_theme = "catppuccin-latte"
dark_theme = "catppuccin-mocha"

[extra]
blog_subtitle = "Engineering notes on AI infrastructure, LLM systems, and software engineering"

[link_checker]
skip_prefixes = ["https://", "http://"]
